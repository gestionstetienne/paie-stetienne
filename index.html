function fmtD(d){if(!d)return"—";var dt=new Date(d+"T00:00:00");var days=["dim","lun","mar","mer","jeu","ven","sam"];var mo=["janv.","févr.","mars","avr.","mai","juin","juil.","août","sept.","oct.","nov.","déc."];return days[dt.getDay()]+" "+dt.getDate()+" "+mo[dt.getMonth()]+" "+dt.getFullYear();}

function vEvol(){var emps=empArr();var ae=selEmp?DS().emp[selEmp]:null;var evs=ae?evalsByEmp(ae.id):[];var h='<div class="sh">Évolution</div><div class="ss">Progression de chaque secrétaire au fil des évaluations.</div><div class="card"><div class="lb">Sélectionner une secrétaire</div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">'+emps.map(function(e,i){return'<button class="pil" data-emp="'+e.id+'" style="font-size:12px;padding:7px 15px;background:'+(selEmp===e.id?col(i):"#f8f5ef")+';color:'+(selEmp===e.id?"#fff":"#4a5568")+';border-color:'+(selEmp===e.id?col(i):"#e8e3d9")+';font-weight:600">'+esc(e.name)+'</button>';}).join("")+'</div></div>';if(!ae)return h+'<div class="card" style="text-align:center;padding:26px;color:#718096;font-size:13px">Sélectionnez une secrétaire.</div>';if(!evs.length)return h+'<div class="card" style="text-align:center;padding:26px;color:#718096;font-size:13px">Aucune évaluation pour '+esc(ae.name)+'.</div>';var f=sc(evs[0].tasks);var l=sc(evs[evs.length-1].tasks);var diff=pct(l.ex,l.n)-pct(f.ex,f.n);var ei=emps.findIndex(function(e){return e.id===ae.id;});h+='<div class="stg"><div class="scc"><div class="scv" style="color:'+col(ei)+'">'+evs.length+'</div><div class="scl">Évaluations</div></div><div class="scc"><div class="scv" style="color:#4a5568">'+evs[0].ds.slice(0,4)+'</div><div class="scl">Première</div></div><div class="scc"><div class="scv" style="color:#4a5568">'+evs[evs.length-1].ds.slice(0,4)+'</div><div class="scl">Dernière</div></div>'+(evs.length>=2?'<div class="scc"><div class="scv" style="color:#27ae60">'+(diff>=0?"+":"")+diff+'%</div><div class="scl">Évol. surpasse</div></div>':"")+' </div>';var cData=evs.map(function(ev){var s=sc(ev.tasks);return{dt:fmtS(ev.ds),ex:pct(s.ex,s.n),ok:pct(s.ok,s.n),at:pct(s.at,s.n)};});h+='<div class="card"><div class="fl">Évolution des appréciations</div>'+svgLine(cData)+'</div>';var lastEv=evs[evs.length-1];var rad=LEVELS.map(function(lv){var lt=Object.values(lastEv.tasks).filter(function(t){return t.lid===lv.id&&t.a;});var ex=lt.filter(function(t){return t.a==="ex";}).length;var ok=lt.filter(function(t){return t.a==="ok";}).length;var tot=lt.length;return{lv:"N"+lv.id,score:tot>0?Math.round((ex*3+ok*2)/tot/3*100):0};});if(rad.some(function(d){return d.score>0;}))h+='<div class="card"><div class="fl">Profil par niveau — dernière évaluation</div>'+svgRadar(rad)+'</div>';h+='<div class="card"><div class="fl">Chronologie des périodes</div>';evs.forEach(function(ev,i){var s=sc(ev.tasks);var isL=i===evs.length-1;h+='<div class="tl" style="background:'+(isL?"rgba(42,127,127,.06)":"#f8f5ef")+';border-color:'+(isL?"#2a7f7f":"#e8e3d9")+'"><div class="tld" style="background:'+(isL?"#2a7f7f":"#aaa")+'">'+ev.ds.slice(0,4)+'</div><div style="flex:1"><div style="font-weight:600;font-size:12px;color:#1a2744">'+fmtS(ev.ds)+' → '+fmtS(ev.de)+'</div><div style="font-size:10px;color:#718096">Niveau '+ev.niv+'</div></div><div style="display:flex;gap:4px;flex-wrap:wrap">'+pills(s)+'</div>'+(isL?'<span style="font-size:9px;background:#2a7f7f;color:#fff;padding:2px 5px;border-radius:18px">Dernière</span>':'')+'</div>';});return h+'</div>';}
function vSet(){var emps=empArr();var vm=evMap();var h='<div class="sh">Paramètres</div><div class="ss">Gérez les évaluateurs, les secrétaires et les exports.</div><div class="card"><div class="fl">Évaluateurs</div>';(S.evs||[]).forEach(function(ev){var isDef=["ev1","ev2","ev3","ev4","ev5","ev6","ev7"].includes(ev.id);h+='<div class="evr"><div style="flex:1"><div style="font-weight:600;font-size:13px;color:#1a2744">'+esc(ev.name)+'</div>'+(ev.role?'<div style="font-size:11px;color:#718096">'+esc(ev.role)+'</div>':"")+'</div>'+(isDef?'<span style="font-size:9px;color:#718096;background:#e8e3d9;padding:2px 8px;border-radius:18px">Par défaut</span>':'<button class="btn-ol" data-rmev="'+ev.id+'" style="color:#c0392b;border-color:#c0392b">Retirer</button>')+'</div>';});h+='<div class="ab2 abg" style="margin-top:12px"><div style="font-weight:600;font-size:12px;color:#27ae60;margin-bottom:9px">+ Ajouter un évaluateur</div><div class="g3"><div class="fg"><div class="lb">Nom</div><input class="inp" id="sEN" placeholder="Prénom Nom"></div><div class="fg"><div class="lb">Rôle</div><input class="inp" id="sER" placeholder="Ex. : Assistante dentaire"></div><button class="btn btn-g" id="sAddEv">Ajouter</button></div></div></div><div class="card"><div class="fl">Secrétaires</div>';if(!emps.length)h+='<div style="font-size:13px;color:#718096;padding:8px;text-align:center">Aucune secrétaire.</div>';emps.forEach(function(emp,i){var ec=Object.values(S.evl||{}).filter(function(e){return e.eid===emp.id;}).length;h+='<div class="empr"><div style="width:30px;height:30px;border-radius:7px;background:'+col(i)+';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;flex-shrink:0">'+esc(emp.name.charAt(0))+'</div><div style="flex:1"><div style="font-weight:600;font-size:13px;color:#1a2744">'+esc(emp.name)+'</div><div style="font-size:11px;color:#718096">'+ANCS[emp.anc||0]+' · '+ec+' éval.</div></div><button class="btn-ol" data-rmemp="'+emp.id+'" style="color:#c0392b;border-color:#c0392b">Retirer</button></div>';});h+='<div class="ab2 abt" style="margin-top:12px"><div style="font-weight:600;font-size:12px;color:#2a7f7f;margin-bottom:9px">+ Ajouter une secrétaire</div><div class="g2" style="align-items:flex-end"><div class="fg"><div class="lb">Nom complet</div><input class="inp" id="sEmpN" placeholder="Prénom Nom"></div><button class="btn" id="sAddEmp">Ajouter</button></div></div></div><div class="card"><div class="fl">Export par courriel</div><p style="font-size:12px;color:#718096;margin-bottom:12px">Envoyez le sommaire complet d\'une secrétaire en un clic.</p><div class="gc">';emps.forEach(function(emp,i){var ec=Object.values(S.evl||{}).filter(function(e){return e.eid===emp.id;}).length;h+='<button data-mail="'+emp.id+'" style="display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:10px;border:1px solid #e8e3d9;background:#fff;cursor:pointer;text-align:left;width:100%"><div style="width:32px;height:32px;border-radius:7px;background:'+col(i)+';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;flex-shrink:0">'+esc(emp.name.charAt(0))+'</div><div style="flex:1"><div style="font-weight:600;font-size:12px;color:#1a2744">'+esc(emp.name)+'</div><div style="font-size:11px;color:#718096">'+ec+' éval. · ✉️ Exporter</div></div></button>';});h+='</div></div>';return h;}
function render(v){
  if(v)view=v;
  document.querySelectorAll(".nb").forEach(function(b){b.classList.toggle("on",b.dataset.v===view);});
  var app=document.getElementById("app");
  var pvH=pv?'<div class="pv-bar">👁 Aperçu fictif — Sophie Beauchemin, Laura Thibodeau, Isabelle Fontaine, Maude Pelletier. Aucune donnée réelle n\'est affectée.</div>':"";
  if(view==="db")app.innerHTML=pvH+vDB();
  else if(view==="new")app.innerHTML=pvH+(pv?'<div class="card" style="text-align:center;padding:30px;color:#718096">Désactivez l\'aperçu pour créer une vraie évaluation.</div>':vNew());
  else if(view==="hist")app.innerHTML=pvH+vHist();
  else if(view==="evol")app.innerHTML=pvH+vEvol();
  else if(view==="set")app.innerHTML=pvH+(pv?'<div class="card" style="text-align:center;padding:30px;color:#718096">Paramètres désactivés en mode aperçu.</div>':vSet());
  bind();
}
function refreshTaskRow(k){var tr=document.getElementById("tr_"+k);if(!tr)return;var st=NE.tasks[k];var bg=st.a==="at"?"#fdf2f1":st.a==="ok"?"#fef9f4":st.a==="ex"?"#f0faf4":"#fff";var bc=st.a==="at"?"rgba(192,57,43,.25)":st.a==="ok"?"rgba(230,126,34,.2)":st.a==="ex"?"rgba(39,174,96,.2)":"transparent";tr.style.borderColor=bc;var ti=tr.querySelector(".ti");if(ti)ti.style.background=bg;tr.querySelectorAll(".apb").forEach(function(b){var sel=b.dataset.a===st.a;b.classList.toggle("sel",sel);b.style.opacity=st.a&&!sel?"0.4":"1";});var cz=tr.querySelector(".cz");if(cz)cz.classList.toggle("sh2",st.a==="at");}
function refreshScore(){var s=sc(NE.tasks);var sg=document.getElementById("nSG");if(sg)sg.innerHTML=sGrid(s);var pb=document.getElementById("nPB");if(pb)pb.innerHTML=s.n?'<div class="pb"><div class="ps" style="width:'+pct(s.at,s.n)+'%;background:#c0392b"></div><div class="ps" style="width:'+pct(s.ok,s.n)+'%;background:#e67e22"></div><div class="ps" style="width:'+pct(s.ex,s.n)+'%;background:#27ae60"></div></div>':"";}
function chkDates(){var dsE=document.getElementById("nDS");var deE=document.getElementById("nDE");var nES=document.getElementById("nES");var nEN=document.getElementById("nEN");if(!dsE||!deE)return true;var ds=dsE.value;var de=deE.value;var pi=document.getElementById("nPI");if(!pi)return true;if(!ds||!de){pi.innerHTML="";return true;}if(ds>de){pi.innerHTML='<div class="pi err">⚠️ La date de début doit être avant la date de fin.</div>';return false;}var empName=(nEN?nEN.value:"").trim();var empId=nES?nES.value:"";var tid=empId||(Object.keys(S.emp).find(function(k){return S.emp[k].name.toLowerCase()===empName.toLowerCase();}));if(tid){var c=Object.values(S.evl).find(function(e){return e.eid===tid&&over(ds,de,e.ds,e.de);});if(c){pi.innerHTML='<div class="pi err">⚠️ Chevauchement avec l\'évaluation du '+fmtS(c.ds)+' au '+fmtS(c.de)+'.</div>';return false;}}var days=Math.round((new Date(de)-new Date(ds))/86400000);pi.innerHTML='<div class="pi">📅 <span style="color:#2a7f7f;font-weight:600">'+fmtD(ds)+' → '+fmtD(de)+'</span><span style="font-size:11px;color:#718096;margin-left:auto">'+days+' jours</span></div>';return true;}
function doSave(){var nEN=document.getElementById("nEN");var nES=document.getElementById("nES");var nEV=document.getElementById("nEV");var nEVO=document.getElementById("nEVO");var nDS=document.getElementById("nDS");var nDE=document.getElementById("nDE");var nANC=document.getElementById("nANC");var name=(nEN?nEN.value:"").trim();if(!name){alert("Veuillez saisir le nom de la secrétaire.");return;}var evId=nEV?nEV.value:"ev1";var evName=evId==="ev7"?(nEVO?nEVO.value:"").trim():(S.evs||[]).find(function(e){return e.id===evId;});evName=typeof evName==="object"?evName.name:evName||"";if(!evName){alert("Veuillez saisir l'évaluateur.");return;}if(!chkDates())return;var ds=nDS.value;var de=nDE.value;var anc=+(nANC?nANC.value:0);var rid=nES?nES.value:"";if(!rid){var m=Object.entries(S.emp).find(function(e){return e[1].name.toLowerCase()===name.toLowerCase();});if(m)rid=m[0];else{rid="emp_"+Date.now();S.emp[rid]={id:rid,name:name,anc:anc};}}S.emp[rid].anc=anc;var eid="eval_"+Date.now();S.evl[eid]={id:eid,eid:rid,ds:ds,de:de,ev:evId==="ev7"?(nEVO?nEVO.value.trim():""):evId,anc:anc,niv:NE.niv,tasks:NE.tasks};saveStore();document.getElementById("app").innerHTML='<div class="card" style="text-align:center;padding:40px"><div style="font-size:42px;margin-bottom:12px">✅</div><div style="font-size:19px;color:#2a7f7f;font-weight:700">Évaluation enregistrée !</div></div>';setTimeout(function(){NE={tasks:blankTasks(),niv:0,anc:0,openLvls:{1:true}};render("hist");},1400);}
function bind(){
  var app=document.getElementById("app");
  app.onclick=function(e){
    var t=e.target;
    var go=t.closest("[data-go]");if(go){selEmp=go.dataset.emp||null;render(go.dataset.go);return;}
    var emp=t.closest("[data-emp]");if(emp&&!t.closest("[data-go]")){selEmp=emp.dataset.emp==="null"?null:emp.dataset.emp;render();return;}
    var mail=t.closest("[data-mail]");if(mail){doMail(mail.dataset.mail);return;}
    var ehd=t.closest(".ehd");if(ehd){var det=document.getElementById("ed_"+ehd.dataset.evid);if(det){var op=det.classList.toggle("op");var chev=ehd.querySelector("span:last-child");if(chev)chev.textContent=op?"▴":"▾";}return;}
    var lh=t.closest("[data-lhid]");if(lh&&view==="new"){var lid=+lh.dataset.lhid;NE.openLvls[lid]=!NE.openLvls[lid];var body=document.getElementById("lb_"+lid);if(body)body.classList.toggle("op",NE.openLvls[lid]);lh.style.background=NE.openLvls[lid]?(lid===5?"rgba(26,39,68,.05)":"rgba(42,127,127,.05)"):"#f8f5ef";var chev2=lh.querySelector("span:last-child");if(chev2)chev2.style.transform=NE.openLvls[lid]?"rotate(180deg)":"none";return;}
    var lv=t.closest("[data-lv]");if(lv&&view==="new"){NE.niv=+lv.dataset.lv;var ls=document.getElementById("nLS");if(ls)ls.innerHTML=lvlSel(NE.niv);var rp=document.getElementById("nRP");if(rp)rp.innerHTML=rateP(NE.anc,NE.niv);return;}
    var apb=t.closest(".apb");if(apb&&view==="new"){var k=apb.dataset.k;var a=apb.dataset.a;if(!NE.tasks[k])return;NE.tasks[k].a=NE.tasks[k].a===a?null:a;refreshTaskRow(k);refreshScore();return;}
    if(t.id==="nSAVE"){doSave();return;}
    if(t.id==="sAddEv"){var n=(document.getElementById("sEN")||{}).value;var r=(document.getElementById("sER")||{}).value||"";if(!n||!n.trim())return;S.evs=[...(S.evs||[]),{id:"ev_"+Date.now(),name:n.trim(),role:r.trim()}];saveStore();render();return;}
    if(t.id==="sAddEmp"){var en=(document.getElementById("sEmpN")||{}).value;if(!en||!en.trim())return;if(Object.values(S.emp).some(function(e){return e.name.toLowerCase()===en.trim().toLowerCase();})){alert("Cette secrétaire existe déjà.");return;}var eid2="emp_"+Date.now();S.emp[eid2]={id:eid2,name:en.trim(),anc:0};saveStore();render();return;}
    var rmev=t.closest("[data-rmev]");if(rmev){if(!confirm("Retirer cet évaluateur ?"))return;S.evs=(S.evs||[]).filter(function(e){return e.id!==rmev.dataset.rmev;});saveStore();render();return;}
    var rmemp=t.closest("[data-rmemp]");if(rmemp){var evs2=Object.values(S.evl||{}).filter(function(e){return e.eid===rmemp.dataset.rmemp;});if(!confirm("Retirer cette secrétaire ?"+(evs2.length?" ("+evs2.length+" éval. supprimées)":"")))return;delete S.emp[rmemp.dataset.rmemp];evs2.forEach(function(e){delete S.evl[e.id];});saveStore();render();return;}
  };
  if(view==="new"){
    var nES=document.getElementById("nES");if(nES)nES.onchange=function(){var emp=nES.value?S.emp[nES.value]:null;var nEN=document.getElementById("nEN");if(nEN){nEN.value=emp?emp.name:"";nEN.disabled=!!emp;}if(emp){NE.anc=emp.anc||0;var na=document.getElementById("nANC");if(na)na.value=NE.anc;var rp=document.getElementById("nRP");if(rp)rp.innerHTML=rateP(NE.anc,NE.niv);}chkDates();};
    var nEN2=document.getElementById("nEN");if(nEN2)nEN2.oninput=chkDates;
    var nEV=document.getElementById("nEV");if(nEV)nEV.onchange=function(){var o=document.getElementById("nEVO");if(o)o.classList.toggle("hidden",nEV.value!=="ev7");};
    var nDS=document.getElementById("nDS");if(nDS)nDS.oninput=chkDates;
    var nDE=document.getElementById("nDE");if(nDE)nDE.oninput=chkDates;
    var nANC=document.getElementById("nANC");if(nANC)nANC.onchange=function(){NE.anc=+nANC.value;var rp=document.getElementById("nRP");if(rp)rp.innerHTML=rateP(NE.anc,NE.niv);};
    app.oninput=function(e){var ta=e.target.closest(".ci");if(ta&&ta.dataset.k&&NE.tasks[ta.dataset.k])NE.tasks[ta.dataset.k].c=ta.value;};
  }
}
